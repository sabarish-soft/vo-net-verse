<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Von Neumann: Prototype</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;padding:20px;background:#0b1020;color:#e6eef8}
    .card{background:#111427;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.5)}
    h1{margin:0 0 8px;font-size:20px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    label{display:block;font-size:13px;color:#9fb0d7}
    button{background:#1f6feb;color:white;border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
    select,input[type=number]{padding:6px;border-radius:6px;border:1px solid #22314a;background:#0b1730;color:#e6eef8}
    .resources{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .res{background:#0d1630;padding:10px;border-radius:6px;text-align:center}
    small{color:#88a2d6}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .simulation{position:relative;height:260px;background:#07101f;border-radius:12px;overflow:hidden;border:1px solid #1b2a47;box-shadow:inset 0 0 30px rgba(0,136,255,.08)}
    .node{position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(110,190,255,.88);box-shadow:0 0 16px rgba(110,190,255,.22)}
    .probe{position:absolute;width:10px;height:10px;border-radius:50%;background:#9ad4ff;box-shadow:0 0 12px rgba(154,212,255,.8);pointer-events:none;will-change:transform}
    .probe::after{content:'';position:absolute;left:50%;top:50%;width:4px;height:4px;margin:-2px 0 0 -2px;border-radius:50%;background:#fff}
    .simInfo{display:grid;grid-template-columns:repeat(3,minmax(130px,1fr));gap:10px;margin-top:12px}
    .infoTile{background:rgba(13,22,48,.96);padding:12px;border-radius:10px;border:1px solid #1f2f52}
    .infoTile strong{display:block;margin-bottom:6px;color:#c8e0ff;font-size:13px}
    .infoTile div{font-size:14px;line-height:1.5;color:#e6eef8}
    .hint{color:#8be2ff;font-size:13px;line-height:1.5}
    footer{margin-top:16px;color:#7f98c0;font-size:13px}
    .muted{color:#7f98c0}
  </style>
</head>
<body>
  <div class="card">
    <h1>Von Neumann — Prototype</h1>
    <div class="row">
      <div>
        <label>Philosophy</label>
        <select id="philosophy">
          <option>Expansionist</option>
          <option>Industrialist</option>
          <option>Scientist</option>
          <option>Preservationist</option>
          <option>Network Architect</option>
        </select>
      </div>
      <div>
        <label>Age</label>
        <select id="age">
          <option>Pioneer Age</option>
          <option>Expansion Age</option>
          <option>Automation Age</option>
          <option>Stellar Age</option>
          <option>Dyson Age</option>
          <option>Singularity Age</option>
          <option>Transcendence Age</option>
        </select>
      </div>
      <div>
        <label>Auto-save</label>
        <select id="autosave"><option value="on">On</option><option value="off">Off</option></select>
      </div>
      <div>
        <label>Save / Load</label>
        <div class="row">
          <button id="saveBtn">Save</button>
          <button id="loadBtn">Load</button>
          <button id="newBtn">New Game</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row resources" id="resources">
      <!-- resource tiles inserted by JS -->
    </div>
    <div style="margin-top:12px" class="actions">
      <button id="buildProbe">Build Probe (-50 Matter)</button>
      <button id="colonize">Colonize System (-100 Matter)</button>
      <button id="research">Research (+20 Knowledge, -10 Compute)</button>
      <button id="buildFactory">Build Factory (-80 Matter)</button>
      <button id="advanceAge">Advance Age (cost: 200 Knowledge)</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Network</h2>
    <div class="row">
      <div>
        <label>Probes</label>
        <div id="probes">0</div>
      </div>
      <div>
        <label>Colonized Systems</label>
        <div id="systems">0</div>
      </div>
      <div>
        <label>Compute Capacity</label>
        <div id="compute">0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Simulation</h2>
    <div id="simulation" class="simulation"></div>
    <div class="simInfo">
      <div class="infoTile"><strong>Tick</strong><div id="tickCount">0</div></div>
      <div class="infoTile"><strong>Resource flow</strong><div id="tickDelta">Matter+0 Energy+0 Knowledge+0 Compute+0</div></div>
      <div class="infoTile"><strong>Next action</strong><div id="nextAction">Build probes or colonize to grow.</div></div>
    </div>
    <div id="simStatus" class="muted" style="margin-top:10px;font-size:13px">Probes are scanning nearby systems...</div>
  </div>

  <footer class="muted">Prototype: basic actions and localStorage persistence. State key: <code>von_state_v1</code></footer>

  <script>
    const STORAGE_KEY = 'von_state_v1'

    const defaultState = {
      philosophy: 'Expansionist',
      age: 'Pioneer Age',
      resources: { matter: 300, energy: 150, knowledge: 20, compute: 10 },
      probes: 1,
      systems: 1,
      factories: 0,
      autosave: 'on'
    }

    let state = {...defaultState}

    // DOM refs
    const philosophy = document.getElementById('philosophy')
    const age = document.getElementById('age')
    const autosave = document.getElementById('autosave')
    const resourcesEl = document.getElementById('resources')
    const probesEl = document.getElementById('probes')
    const systemsEl = document.getElementById('systems')
    const computeEl = document.getElementById('compute')

    function renderResources(){
      resourcesEl.innerHTML = ''
      const labels = {matter:'Matter', energy:'Energy', knowledge:'Knowledge', compute:'Compute'}
      for(const k of Object.keys(state.resources)){
        const el = document.createElement('div')
        el.className = 'res'
        el.innerHTML = `<div style="font-weight:600">${Math.floor(state.resources[k])}</div><small>${labels[k]}</small>`
        resourcesEl.appendChild(el)
      }
      probesEl.textContent = state.probes
      systemsEl.textContent = state.systems
      computeEl.textContent = state.resources.compute
    }

    function save(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state))
        console.log('Saved')
      }catch(e){console.error('Save failed',e)}
    }

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY)
        if(!raw) return false
        state = JSON.parse(raw)
        applyStateToUI()
        renderResources()
        return true
      }catch(e){console.error('Load failed',e); return false}
    }

    function newGame(){
      if(!confirm('Start a new game? This will overwrite current progress.')) return
      state = {...defaultState}
      applyStateToUI()
      renderResources()
      save()
    }

    function applyStateToUI(){
      philosophy.value = state.philosophy
      age.value = state.age
      autosave.value = state.autosave || 'on'
    }

    // Actions
    function buildProbe(){
      if(state.resources.matter < 50) { alert('Not enough Matter') ; return }
      state.resources.matter -= 50
      state.probes += 1
      state.resources.compute += 1
      commit()
    }

    function colonize(){
      if(state.resources.matter < 100) { alert('Not enough Matter') ; return }
      state.resources.matter -= 100
      state.systems += 1
      // small bonuses
      state.resources.energy += 20
      state.resources.knowledge += 5
      commit()
    }

    function research(){
      if(state.resources.compute < 2){ alert('Not enough Compute') ; return }
      state.resources.knowledge += 20
      state.resources.compute -= 2
      commit()
    }

    function buildFactory(){
      if(state.resources.matter < 80){ alert('Not enough Matter') ; return }
      state.resources.matter -= 80
      state.factories += 1
      state.resources.matter += 20 // factories slowly increase output
      commit()
    }

    function advanceAge(){
      if(state.resources.knowledge < 200){ alert('Need 200 Knowledge to advance') ; return }
      state.resources.knowledge -= 200
      // simple age progression
      const ages = ['Pioneer Age','Expansion Age','Automation Age','Stellar Age','Dyson Age','Singularity Age','Transcendence Age']
      const idx = ages.indexOf(state.age)
      if(idx < ages.length - 1) state.age = ages[idx+1]
      commit()
    }

    function commit(){
      renderResources()
      refreshSimulation()
      updateNextActionHint()
      if(autosave.value === 'on') save()
    }

    const simulationEl = document.getElementById('simulation')
    const simStatus = document.getElementById('simStatus')
    const tickCountEl = document.getElementById('tickCount')
    const tickDeltaEl = document.getElementById('tickDelta')
    const nextActionEl = document.getElementById('nextAction')
    const simNodes = []
    const simProbes = []
    const simBounds = { width: 0, height: 0 }
    let tickNumber = 0
    let tickDelta = { matter: 0, energy: 0, knowledge: 0, compute: 0 }

    function createSimulationObjects(){
      simulationEl.innerHTML = ''
      simNodes.length = 0
      simProbes.length = 0
      simBounds.width = simulationEl.clientWidth
      simBounds.height = simulationEl.clientHeight

      for(let i = 0; i < Math.max(3, state.systems + 1); i++){
        const node = document.createElement('div')
        node.className = 'node'
        const pos = randomPosition(28)
        node.dataset.x = pos.x
        node.dataset.y = pos.y
        node.style.left = `${pos.x}px`
        node.style.top = `${pos.y}px`
        simulationEl.appendChild(node)
        simNodes.push(node)
      }

      for(let i = 0; i < Math.min(8, state.probes); i++){
        const probe = document.createElement('div')
        probe.className = 'probe'
        const pos = randomPosition(20)
        probe.dataset.x = pos.x
        probe.dataset.y = pos.y
        probe.dataset.vx = (Math.random() - 0.5) * 1.6
        probe.dataset.vy = (Math.random() - 0.5) * 1.6
        probe.style.transform = `translate(${pos.x}px, ${pos.y}px)`
        simulationEl.appendChild(probe)
        simProbes.push(probe)
      }
    }

    function randomPosition(margin){
      const x = margin + Math.random() * (simBounds.width - margin * 2)
      const y = margin + Math.random() * (simBounds.height - margin * 2)
      return { x, y }
    }

    function refreshSimulation(){
      simStatus.textContent = `Active probes: ${state.probes} • Systems scanned: ${state.systems} • Age: ${state.age}`
      tickCountEl.textContent = tickNumber
      tickDeltaEl.textContent = `Matter ${formatDelta(tickDelta.matter)} Energy ${formatDelta(tickDelta.energy)} Knowledge ${formatDelta(tickDelta.knowledge)} Compute ${formatDelta(tickDelta.compute)}`
      nextActionEl.textContent = suggestNextAction()
      if(simBounds.width === 0) return
      if(simNodes.length !== Math.max(3, state.systems + 1) || simProbes.length !== Math.min(8, state.probes)){
        createSimulationObjects()
      }
    }

    function formatDelta(value){
      return value >= 0 ? `+${value}` : `${value}`
    }

    function suggestNextAction(){
      if(state.resources.matter < 80) return 'Low matter: colonize systems or build a factory to increase output.'
      if(state.resources.compute < 5) return 'Compute is limited: build more probes to raise capacity.'
      if(state.resources.knowledge < 200) return 'Research now to unlock a new age.'
      if(state.systems < 5) return 'Expand to more systems for stronger growth.'
      return 'You are ready to advance age or keep building your network.'
    }

    function animateSimulation(){
      simProbes.forEach(probe => {
        let x = parseFloat(probe.dataset.x)
        let y = parseFloat(probe.dataset.y)
        let vx = parseFloat(probe.dataset.vx)
        let vy = parseFloat(probe.dataset.vy)

        const target = simNodes[Math.floor(Math.random() * simNodes.length)]
        const tx = parseFloat(target.dataset.x)
        const ty = parseFloat(target.dataset.y)
        const dx = tx - x
        const dy = ty - y
        const dist = Math.max(30, Math.hypot(dx, dy))
        const ax = dx / dist * 0.04
        const ay = dy / dist * 0.04

        vx += ax
        vy += ay
        vx *= 0.995
        vy *= 0.995

        x += vx
        y += vy

        if(x < 6 || x > simBounds.width - 14) vx *= -1
        if(y < 6 || y > simBounds.height - 14) vy *= -1

        probe.dataset.x = x
        probe.dataset.y = y
        probe.dataset.vx = vx
        probe.dataset.vy = vy
        probe.style.transform = `translate(${x}px, ${y}px)`
      })
      window.requestAnimationFrame(animateSimulation)
    }

    function tickSimulation(){
      tickNumber += 1
      const matterGain = Math.max(1, Math.round(state.systems * 2 + state.factories * 1))
      const energyGain = Math.max(0, Math.round(state.systems * 1 + state.probes * 0.4))
      const knowledgeGain = Math.max(0, Math.round(state.probes * 0.6 + state.systems * 0.2))
      const computeGain = Math.max(0, Math.round(state.probes * 0.3 + state.factories * 0.2))

      state.resources.matter += matterGain
      state.resources.energy += energyGain
      state.resources.knowledge += knowledgeGain
      state.resources.compute += computeGain

      tickDelta = {
        matter: matterGain,
        energy: energyGain,
        knowledge: knowledgeGain,
        compute: computeGain
      }

      renderResources()
      refreshSimulation()
    }

    function updateNextActionHint(){
      nextActionEl.textContent = suggestNextAction()
    }

    // wire events
    document.getElementById('saveBtn').addEventListener('click', save)
    document.getElementById('loadBtn').addEventListener('click', ()=>{ if(!load()) alert('No save found') })
    document.getElementById('newBtn').addEventListener('click', newGame)
    document.getElementById('buildProbe').addEventListener('click', buildProbe)
    document.getElementById('colonize').addEventListener('click', colonize)
    document.getElementById('research').addEventListener('click', research)
    document.getElementById('buildFactory').addEventListener('click', buildFactory)
    document.getElementById('advanceAge').addEventListener('click', advanceAge)

    philosophy.addEventListener('change', e=>{ state.philosophy = e.target.value; commit() })
    age.addEventListener('change', e=>{ state.age = e.target.value; commit() })
    autosave.addEventListener('change', e=>{ state.autosave = e.target.value; commit() })

    window.addEventListener('resize', ()=>{
      simBounds.width = simulationEl.clientWidth
      simBounds.height = simulationEl.clientHeight
      refreshSimulation()
    })

    // initial load
    if(!load()){
      state = {...defaultState}
      applyStateToUI()
      renderResources()
      save()
    }

    createSimulationObjects()
    animateSimulation()
    tickSimulation()
    setInterval(tickSimulation, 1000)
  </script>
</body>
</html>
